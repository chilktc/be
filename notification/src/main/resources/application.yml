server:
  port: 8083

spring:
  jackson:
    time-zone: Asia/Seoul

  application:
    name: notification
  config:
    import: optional:classpath:greenroom-templates.yml

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:notification}?rewriteBatchedStatements=true&cachePrepStmts=true&useServerPrepStmts=true
    username: ${DB_USERNAME:auth}
    password: ${DB_PASSWORD:auth}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 200
          time_zone: Asia/Seoul
        order_inserts: true
        order_updates: true
        jdbc.batch_versioned_data: true

  kafka:
    bootstrap-servers: ${kafka.servers:localhost:29092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
#  kafka:
